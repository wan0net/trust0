when:
  event: release
  evaluate: 'CI_COMMIT_PRERELEASE == "true"'
steps:
  publish-prerelease:
    image: node:20
    commands:
      - npm ci
      - npm config set -- '//registry.npmjs.org/:_authToken' "$npm_token"
      - npm publish --verbose --tag next
    secrets: [ npm_token ]

depends_on:
  - test