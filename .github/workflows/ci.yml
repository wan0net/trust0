name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @trust0/identity test

  interop:
    runs-on: ubuntu-latest
    services:
      aspe-server:
        image: codeberg.org/keyoxide/aspe-server:latest
        env:
          ASPE_DOMAIN: localhost:3000
        ports:
          - 3000:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - name: Wait for ASPE server
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:3000/.well-known/aspe/version && break
            sleep 1
          done
      - name: Run interop tests against Keyoxide ASPE server
        run: pnpm --filter @trust0/identity test
        env:
          ASPE_TEST_URL: http://localhost:3000

  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - run: semgrep scan --config auto --config p/javascript --config p/typescript --config p/owasp-top-ten --error --json > semgrep-results.json || true
      - run: semgrep scan --config auto --config p/javascript --config p/typescript --config p/owasp-top-ten --error
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: semgrep-results.json

  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          scanners: vuln,secret,misconfig
          trivyignores: .trivyignore
      - name: Run Trivy SARIF output
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          scanners: vuln,secret,misconfig
          trivyignores: .trivyignore
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: trivy-results.sarif
